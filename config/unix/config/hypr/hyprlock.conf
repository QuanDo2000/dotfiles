$font = Monospace

general {
    hide_cursor = false
}

background {
    monitor = 
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor = DP-3
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $TIME
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = center
    valign = top
}

label {
    monitor = DP-3
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = center
    valign = top
}
