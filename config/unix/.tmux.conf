# Enable true color support. Use a terminal-agnostic RGB capability so 24-bit
# color works regardless of the outer terminal's TERM (e.g. ghostty reports
# xterm-ghostty, which a TERM-specific override like xterm-256color:RGB misses,
# downgrading colors to 256 — washed-out catppuccin).
set -as terminal-features ",*:RGB"

# Claude configs
set -g allow-passthrough on
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Enable OSC 52 clipboard
set -g set-clipboard on

set -g display-time 4000
set -g status-interval 5
bind C-p previous-window
bind C-n next-window
bind b last-window
bind R run-shell 'tmux source-file ~/.config/tmux/tmux.conf > /dev/null; tmux display-message "Sourced tmux.conf!"'

# --- tmux-pain-control (inlined; formerly tmux-plugins/tmux-pain-control) ---
# Pane navigation
bind h select-pane -L
bind C-h select-pane -L
bind j select-pane -D
bind C-j select-pane -D
bind k select-pane -U
bind C-k select-pane -U
bind l select-pane -R
bind C-l select-pane -R
# Window reordering
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Splits and new windows open in the current path
bind "|" split-window -h -c "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "_" split-window -fv -c "#{pane_current_path}"
bind "%" split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-right-length 100
set -g status-left ''

set -gF status-right '#{@catppuccin_status_directory}'
set -agF status-right '#{@catppuccin_status_user}'
set -agF status-right '#{@catppuccin_status_host}'
set -agF status-right '#{E:@catppuccin_status_date_time}'
