name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck -S warning -e SC1090,SC1091,SC2034,SC2120 dotfile scripts/*.sh tests/bash/*.sh

  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 3; $i++) {
            try {
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
              break
            } catch {
              if ($i -eq 3) { throw }
              Write-Host "Install-Module failed (attempt $i/3): $($_.Exception.Message)"
              Start-Sleep -Seconds (10 * $i)
            }
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
            if ($errors.Count -gt 0) {
              Write-Host "PSScriptAnalyzer found $($errors.Count) error(s)."
              exit 1
            }
          } else {
            Write-Host "PSScriptAnalyzer: no issues found."
          }
