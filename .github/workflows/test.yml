name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bash:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Run bash tests
        shell: bash
        run: nix develop . -c bash ./tests/bash/runner.sh --no-docker

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Neovim
        shell: pwsh
        run: |
          $wingetNvim = Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Links\nvim.exe'
          $wingetPackage = Get-ChildItem (Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Packages') -Filter nvim.exe -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not (Get-Command nvim -ErrorAction SilentlyContinue) -and -not (Test-Path -LiteralPath $wingetNvim) -and -not $wingetPackage) {
            winget install --id Neovim.Neovim --exact --silent --accept-package-agreements --accept-source-agreements
          }

      - name: Run PowerShell tests (Windows)
        shell: pwsh
        run: ./tests/powershell/runner.ps1

      - name: Test LazyVim bootstrap (Windows)
        shell: pwsh
        run: ./tests/powershell/integration_lazyvim.ps1

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Run flake check
        run: nix flake check --no-build --all-systems

      - name: Build custom packages
        run: nix build .#codex .#obsidian-headless .#pi-agent .#fff-mcp --no-link
