name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bash:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Run bash tests
        shell: bash
        run: ./tests/bash/runner.sh --no-docker

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run PowerShell tests (Windows)
        shell: pwsh
        run: ./tests/powershell/runner.ps1

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Run local checks
        run: ./scripts/check.sh
